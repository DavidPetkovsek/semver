name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: "${{ matrix.os }} / ${{ matrix.build_type }} / ${{ matrix.shared == 'ON' && 'shared' || 'static' }}"
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        build_type: [Release]
        shared: [ON, OFF]

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -B build
          -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}
          -DSEMVER_BUILD_TESTS=ON
          -DSEMVER_BUILD_SHARED=${{ matrix.shared }}

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cmake --build build --config ${{ matrix.build_type }} --parallel $(nproc)

      - name: Build (macOS)
        if: runner.os == 'macOS'
        run: cmake --build build --config ${{ matrix.build_type }} --parallel $(sysctl -n hw.ncpu)

      - name: Build (Windows)
        if: runner.os == 'Windows'
        run: |
          $env:PATH = "${{ github.workspace }}\build\${{ matrix.build_type }};$env:PATH"
          cmake --build build --config ${{ matrix.build_type }} -- /m

      - name: Test (Unix)
        if: runner.os != 'Windows'
        run: ./build/tests/semver_tests --colour-mode ansi

      - name: Test (Windows)
        if: runner.os == 'Windows'
        run: |
          $env:PATH = "${{ github.workspace }}\build\${{ matrix.build_type }};$env:PATH"
          ./build/tests/${{ matrix.build_type }}/semver_tests.exe --colour-mode ansi